services:
  apps:
    build:
      context: .
      dockerfile: Dockerfile

    # Container name makes it easier to find in `docker ps`
    container_name: chathackers_uk

    restart: unless-stopped

    # ── Traefik labels ─────────────────────────────────────────────
    labels:
      # Tell Traefik to watch this container
      - "traefik.enable=true"

      # Which Docker network Traefik should use to reach this container
      - "traefik.docker.network=traefik"

      # ── chathackers-wrapper ──────────────────────────────────────────────────
      # Router: matches requests for chathackers.uk
      - "traefik.http.routers.chathackers_uk.rule=Host(`chathackers.uk`)"
      - "traefik.http.routers.chathackers_uk.entrypoints=websecure"
      - "traefik.http.routers.chathackers_uk.tls.certresolver=letsencrypt"
      # Service: tells Traefik which port to forward to
      - "traefik.http.routers.chathackers_uk.service=chathackers_uk-svc"
      - "traefik.http.services.chathackers_uk-svc.loadbalancer.server.port=8138"

    # ── Networking ────────────────────────────────────────────────
    networks:
      - traefik

    env_file:
      - .env

# Reference the pre-existing Traefik network (don't recreate it here)
networks:
  traefik:
    external: true